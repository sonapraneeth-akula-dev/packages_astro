# Pagefind indexing configuration.
#
# By default Pagefind strips punctuation when indexing, so terms like `C#` and
# `C++` collapse to the bare token `c` (and `#`/`+` searches match nothing).
# Keeping `#` and `+` lets Pagefind also index the punctuated tokens, so a
# search for `c#`/`c++` matches those terms specifically.
#
# See https://pagefind.app/docs/indexing/#indexing-special-characters
include_characters: "+#"
